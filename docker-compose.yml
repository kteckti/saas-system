version: '3.8'

# ============================================================================
# SmartOps SaaS - Docker Compose
# PostgreSQL + Application Stack
# ============================================================================

services:
  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  db:
    image: postgres:16-alpine
    container_name: smartops-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartops
      POSTGRES_USER: smartops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SmartOps@2026!}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartops -d smartops"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - smartops-network

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_data:
    driver: local

# ============================================================================
# Networks
# ============================================================================
networks:
  smartops-network:
    driver: bridge