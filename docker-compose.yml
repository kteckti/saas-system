version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: smartops-db
    restart: always
    environment:
      MYSQL_DATABASE: smartops
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: smartops-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=mysql://root:root@db:3306/smartops
      - NODE_ENV=production
    depends_on:
      - db

volumes:
  mysql_data:
